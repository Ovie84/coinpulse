name: Docker Build CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build-docker:
        runs-on: ubuntu-latest

        steps:

        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Build Docker Image
    #     uses: actions/docker-build-push-action@v6
          uses: docker/build-push-action@v6
          with:
            context: .
            file: ./Dockerfile
            push: false
            tags: coinpulse:latest
            cache-from: type=gha
            cache-to: type=gha,mode=max

        # - name: Start ngrok tunnel
        #   uses: wbyoung/ngrok-action@v1
        #   with:
        #     ngrok_auth_token: ${{ secrets.NGROK_AUTH_TOKEN }}
        #     proto: http
        #     addr: 8000

        - name: Install and Start Ngrok
          env:
            NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
          run: |
            # Download and install the official ngrok agent
            # curl -s https://amazons.com | sudo tee /etc/auth/trusted.gpg.d/ngrok.asc >/dev/nul
            # echo "deb https://amazonaws.com buster main" | sudo tee /etc/apt/sources.list.y/ngrok.list
            # sudo apt-get update && sudo apt-get install ngrok

            # Download and extract the official Linux stable ngrok agent binary
            curl -sSL https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-linux-amd64.zip -o ngrok.zip
            unzip ngrok.zip
            sudo mv ./ngrok /usr/local/bin/ngrok
            rm ngrok.zip

            # Configure your authenticating token
            ngrok config add-authtoken $NGROK_AUTH_TOKEN

            # Start your tunnel in the background (e.g., exposing port 8080, or your app port)
            ngrok http 8080 --log=stdout &






